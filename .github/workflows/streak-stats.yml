name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *" # Run every day at 03:00 UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml" # Run whenever this file changes
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0D1117&disable_animations=true
          path: profile/streak.svg
          # For PUBLIC contributions only, the line below is fine as-is.
          # To ALSO count PRIVATE contributions, create a PAT (no scopes needed),
          # add it as a repo secret named STREAK_STATS_TOKEN, then replace
          # GITHUB_TOKEN below with STREAK_STATS_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
